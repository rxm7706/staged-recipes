# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.7"

package:
  name: lyric-py-worker
  version: ${{ version }}

source:
  # Vendor-the-blob pattern (itkwasm-downsample-wasi precedent): the PyPI
  # sdist ships a pre-built WASI binary (python_worker.wasm) as package data.
  # The WASI engine that executes it is supplied by lyric-py's embedded
  # wasmtime crate at runtime — not a build-time dependency here.
  url: https://pypi.org/packages/source/l/lyric-py-worker/lyric_py_worker-${{ version }}.tar.gz
  sha256: 06328b3806bddac258fcc81eab444c351d22157839c0f7d2f5ac1a1df5bfe179

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    # Sole upstream runtime dep (lockstep release with lyric-py-worker).
    - lyric-task >=0.1.7

tests:
  - python:
      imports:
        - lyric_py_worker
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      # Confirm the vendored WASI blob shipped in the wheel; do not invoke it
      # (executing the worker would require a full WASI runtime harness).
      - python -c "import os, lyric_py_worker as m; w = os.path.join(os.path.dirname(m.__file__), 'python_worker.wasm'); assert os.path.isfile(w), w; print('wasm OK:', os.path.getsize(w), 'bytes')"

about:
  homepage: https://github.com/lyric-project/lyric-runtime
  repository: https://github.com/lyric-project/lyric-runtime
  license: MIT
  # PyPI sdist ships no LICENSE; vendored from the upstream v0.1.7 tag.
  license_file: LICENSE
  summary: Default Python WebAssembly worker for Lyric (pre-built WASI component).

extra:
  recipe-maintainers:
    - rxm7706
