# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.0"

package:
  name: dj-control-room
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dj-control-room/dj_control_room-${{ version }}.tar.gz
  sha256: a960d65f5b8c53e9cb1b7472257b1cda4d709f9a31b94ed3dfa52bb8264407b4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - dj-control-room-base >=1.0.0

tests:
  - python:
      imports:
        - dist
        - dj_control_room
        - docs
        - images
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: The control room for your Django app
  license: MIT
  license_file: LICENSE
  homepage: https://yassi.github.io/dj-control-room/
  repository: https://yassi.github.io/dj-control-room/
  documentation: https://yassi.github.io/dj-control-room/

extra:
  recipe-maintainers:
    - rxm7706
