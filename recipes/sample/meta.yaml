requirements:
  build:
    - setuptools >=61.2
#    - {{ compiler('c') }}
#    - {{ compiler('cxx') }}
#    - {{ compiler('fortran') }}
#    - {{ compiler('go') }}
#    - {{ compiler('rust') }}
  host:
    - python >=3.7,<3.11
    - pip
#    - cmake
#    - maturin >=0.12,<0.13
  run:
    - python >=3.7,<3.11
    - kedro >=0.18.4,<0.19.0
    #- pyspark <4.0,>=2.2  # [not win]
    #- matplotlib-base <3.4,>=3.0.3  # [py<39]
    
test:
  imports:
    - kedro_datasets
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/kedro-org/kedro-plugins/tree/main/kedro-datasets
  summary: Kedro-Datasets is where you can find all of Kedro's data connectors.
  license: Apache-2.0
  license_file: 
