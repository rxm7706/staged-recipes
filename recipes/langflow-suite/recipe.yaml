# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.1"
  python_min: "3.11"
  # langflow-sdk ships from the same monorepo (src/sdk) but carries its OWN
  # version, independent of the langflow monorepo tag — bump both on update.
  sdk_version: "0.2.1"
  # langflow-base's own version at the v1.10.1 tag (src/backend/base/pyproject).
  # Used to pull its release-built frontend wheel — bump with the monorepo tag.
  lfb_version: "0.10.1"

recipe:
  name: langflow-suite
  version: ${{ version }}

source:
  - url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 807470ff4bc1283db9716e911af8755b4104847bb6dbba03fc2e610184598fdb
    patches:
      # Applied once to the shared monorepo source: (1) strip optional-integration
      # deps from src/backend/base/pyproject.toml (lean langflow-base);
      # (2) lean the umbrella pyproject.toml (langflow-base, not [complete]; drop
      # the 4 lfx-* hard deps). Both sets move to run_constraints. Source patches
      # instead of per-output in-build seds.
      - 0001-strip-integration-deps.patch
      - 0002-lean-umbrella-deps.patch
  # langflow-base's web UI (langflow/frontend/, the built React bundle) is
  # generated at release time (npm build) and ships ONLY in the PyPI wheel — the
  # GitHub tag carries just src/frontend SOURCE. Pull the prebuilt frontend from
  # the wheel and graft it into the langflow-base output (G73/G51; building it
  # from source would need a build-time npm fetch, against cf norms — G45).
  # Downloaded as a file (not extracted); the langflow-base script unzips it.
  - url: https://pypi.org/packages/py3/l/langflow-base/langflow_base-${{ lfb_version }}-py3-none-any.whl
    sha256: 3e8ba6cf530bbcee07f3d449dac1bf42f166b22aff4ea08d098e7e8c480cca83
    file_name: langflow-base-frontend.whl

build:
  number: 0

outputs:
  # ======================================================================
  # OUTPUT 0: langflow-sdk (Python client SDK — same monorepo, src/sdk)
  # Carries its own version (sdk_version), independent of the langflow tag.
  # Built before lfx so lfx can pin_subpackage it (no external dep / no gate
  # on the standalone staged-recipes #33856).
  # ======================================================================
  - package:
      name: langflow-sdk
      version: ${{ sdk_version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/sdk -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - httpx
        - h2
        - pydantic-settings >=2.10.1
        - pydantic >=2.0.0
        - tomli >=2.2.1
        - typing_extensions >=4.14.0
    tests:
      - python:
          imports:
            - langflow_sdk
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - "*"

  # ======================================================================
  # OUTPUT 1: lfx (Langflow Executor Engine)
  # ======================================================================
  - package:
      name: lfx
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/lfx -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - langchain-core >=1.2.28,<2.0.0
        - pandas >=2.0.0,<3.0.0
        - pydantic >=2.0.0,<3.0.0
        - pillow >=11.1.0,<13.0.0
        - fastapi >=0.135.0,<1.0.0
        - uvicorn >=0.34.3,<1.0.0
        - typer >=0.16.0,<1.0.0
        - platformdirs >=4.3.8,<5.0.0
        - aiofiles >=24.1.0,<25.0.0
        - typing_extensions >=4.14.0,<5.0.0
        - python-dotenv >=1.0.0,<2.0.0
        - rich >=13.0.0,<14.0.0
        - httpx >=0.24.0,<1.0.0
        - aiofile >=3.8.0,<4.0.0
        - json-repair >=0.30.3,<1.0.0
        - docstring_parser >=0.16,<1.0.0
        - networkx >=3.4.2,<4.0.0
        - nanoid >=2.0.0,<3.0.0
        - cachetools >=6.0.0
        - emoji >=2.14.1,<3.0.0
        - chardet >=7.3.0
        - defusedxml >=0.7.1,<1.0.0
        - passlib >=1.7.4,<2.0.0
        - pydantic-settings >=2.10.1,<3.0.0
        - tomli >=2.2.1,<3.0.0
        - pyyaml >=6.0.0,<7.0.0
        - orjson >=3.11.6,<4.0.0
        - asyncer >=0.0.8,<1.0.0
        - structlog >=25.4.0,<26.0.0
        - loguru >=0.7.3,<1.0.0
        - langchain >=1.3.0,<1.4.0
        - langchain-classic >=1.0.7,<1.1.0
        - validators >=0.34.0,<1.0.0
        - filelock >=3.20.1,<4.0.0
        - pypdf >=6.10.0,<7.0.0
        - cryptography >=46.0.7
        - ag-ui-protocol >=0.1.10
        - ${{ pin_subpackage('langflow-sdk', exact=True) }}
        - markitdown >=0.1.4,<2.0.0
        - setuptools >=80.0.0,<81.0.0
        - wheel >=0.46.2,<1.0.0
        - mcp >=1.17.0,<2.0.0
      run_constraints:
        # opendsstar was demoted to an optional group in lfx 1.10.1 (was a hard
        # dep); keep a version pin if a user installs it. This also breaks the
        # lfx -> opendsstar -> litellm HARD chain (Skew 2 can no longer touch the
        # core). Upstream marker excludes osx-64 (darwin x86_64).
        - opendsstar ==1.0.26
    tests:
      - python:
          imports:
            - lfx
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 2: langflow-base (Core Platform & System Execution)
  # ======================================================================
  - package:
      name: langflow-base
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/backend/base -vv --no-deps --no-build-isolation
        # Graft the prebuilt web UI from the langflow-base wheel (G73/G51): the
        # from-source build above produces no frontend.
        - ${{ PYTHON }} -c "import os,sysconfig,zipfile; sp=os.environ.get('SP_DIR') or sysconfig.get_paths()['purelib']; z=zipfile.ZipFile('langflow-base-frontend.whl'); m=[n for n in z.namelist() if n.startswith('langflow/frontend/')]; assert m, 'no langflow/frontend/ in wheel'; z.extractall(sp, m); print('grafted', len(m), 'frontend files ->', sp)"
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - ${{ pin_subpackage('lfx', exact=True) }}
        # Flattened from upstream src/backend/base/pyproject.toml
        # [project.dependencies] (G25: conda has no extras; G24: caps mirrored).
        - fastapi >=0.135.0,<1.0.0
        - slowapi >=0.1.9,<1.0.0
        - httpx >=0.27,<1.0.0
        - aiofile >=3.9.0,<4.0.0
        - uvicorn >=0.30.0,<1.0.0
        - gunicorn >=25.3.0,<27.0.0
        - langchain >=1.3.0,<1.4.0
        - langchain-community >=0.4.1,<0.5.0
        - langchain-core >=1.3.3,<2.0.0
        - langchainhub >=0.1.15,<0.2.0
        - loguru >=0.7.1,<1.0.0
        - structlog >=25.4.0,<26.0.0
        - rich >=13.7.0,<14.0.0
        - langchain-experimental >=0.4.1,<0.5.0
        - sqlmodel >=0.0.37,<0.1.0
        - pydantic >=2.13.0,<3.0.0
        - pydantic-settings >=2.2.0,<3.0.0
        - email-validator >=2.0.0
        - typer >=0.13.0,<1.0.0
        - cachetools >=6.0.0
        - platformdirs >=4.2.0,<5.0.0
        - python-multipart >=0.0.12,<1.0.0
        - orjson >=3.11.6,<4.0.0
        - alembic >=1.13.0,<2.0.0
        - passlib >=1.7.4,<2.0.0
        - bcrypt ==4.0.1
        - pillow >=12.1.1,<13.0.0
        - docstring_parser >=0.16,<1.0.0
        - pyjwt >=2.12.1
        - pandas >=2.2.3
        - multiprocess >=0.70.14,<1.0.0
        - python-docx >=1.1.0,<2.0.0
        - nest-asyncio >=1.6.0,<2.0.0
        - emoji >=2.12.0,<3.0.0
        - cryptography >=46.0.7
        - asyncer >=0.0.5,<1.0.0
        - pyperclip >=1.8.2,<2.0.0
        - uncurl >=0.0.11,<1.0.0
        - sentry-sdk >=2.5.1,<3.0.0
        - chardet >=7.3.0
        - opentelemetry-api >=1.30.0,<2.0.0
        - opentelemetry-sdk >=1.30.0,<2.0.0
        - opentelemetry-exporter-prometheus >=0.50b0,<1.0.0
        - opentelemetry-exporter-otlp >=1.30.0,<2.0.0
        - opentelemetry-instrumentation-fastapi >=0.50b0,<1.0.0
        - opentelemetry-instrumentation-requests >=0.50b0,<1.0.0
        - opentelemetry-instrumentation-urllib3 >=0.50b0,<1.0.0
        - prometheus_client >=0.20.0,<1.0.0
        - aiofiles >=24.1.0,<25.0.0
        - pip >=26.0.0,<27.0.0
        - setuptools >=80.0.0,<81.0.0
        - nanoid >=2.0.0,<3.0.0
        - filelock >=3.20.1,<4.0.0
        - grandalf >=0.8.0,<1.0.0
        - fastapi-pagination >=0.13.1,<1.0.0
        - defusedxml >=0.7.1,<1.0.0
        - pypdf >=6.10.0,<7.0.0
        - validators >=0.34.0,<1.0.0
        - networkx >=3.4.2,<4.0.0
        - json-repair >=0.30.3,<1.0.0
        - mcp >=1.17.0,<2.0.0
        - aiosqlite >=0.20.0,<1.0.0
        - greenlet >=3.1.1,<4.0.0
        - jsonquerylang >=1.1.1,<2.0.0
        - sqlalchemy >=2.0.38,<3.0.0
        - scipy >=1.15.2,<2.0.0
        - jaraco.context >=6.1.0
        - wheel >=0.46.2,<1.0.0
        - dynaconf >=3.2.13,<4.0.0
        - pyasn1 >=0.6.3,<0.7.0
        - langgraph-checkpoint >4.0.0,<5.0.0
      run_constraints:
        # Optional integrations (upstream langflow-base extras) — stripped from the
        # wheel METADATA at build (lean base, no langflow[full]); version-pinned so
        # they are constrained IF a user installs them, never forced.
        - langchain-mongodb >=0.11.0
        - langchain-perplexity >=1.0.0,<2.0.0
        - langchain-qdrant >=1.0.0,<2.0.0
        - langchain-weaviate >=0.0.6
        - langchain-chroma >=0.2.6,<0.3.0
        - langchain-ibm >=1.1.0,<1.2.0
        - ibm-watsonx-ai >=1.3.1,<2.0.0
        - firecrawl-py >=1.0.16,<2.0.0
        - spider-client >=0.0.27,<1.0.0
        - assemblyai >=0.33.0,<1.0.0
        - elevenlabs >=1.52.0,<2.0.0
        - clickhouse-connect ==0.7.19
        - duckdb >=1.0.0,<2.0.0
        - trustcall >=0.0.38,<1.0.0
        - jq >=1.7.0,<2.0.0
        - onnxruntime >=1.20
        - transformers >=5.6.0,<6.0.0   # new hard dep in langflow-base 1.10.1; lean-stripped to run_constraints
    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 3: langflow (Top-Level Web Interface Umbrella Package)
  # ======================================================================
  - package:
      name: langflow
      version: ${{ version }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        # Upstream langflow = langflow-base[complete] + 4 lfx-* extension packs.
        # Lean: hard-dep only langflow-base (it provides the importable `langflow`);
        # the lfx-* packs + all integrations are optional (run_constraints below).
        - ${{ pin_subpackage('langflow-base', exact=True) }}
      run_constraints:
        # langflow's own optional component deps (upstream extras), demoted from run:
        - fastmcp >=3.2.0
        - lark ==1.2.2
        - sseclient-py ==1.8.0
        # 1. Internal Comps/Component Packs (Isolated to prevent staging locks)
        # 2. Heavy Multi-Agent & Specialized LLM Framework Interops
        - litellm >=1.85.1,<2.0.0
        - openai >=1.68.2,<3.0.0
        # 3. Complete LangChain Provider Integration Matrix Constraints
        - langchain-anthropic >=1.4.6,<1.5.0
        - langchain-aws >=1.1.0,<1.2.0
        - langchain-chroma >=0.2.6,<0.3.0
        - langchain-experimental >=0.4.1,<0.5.0
        - langchain-google-genai >=4.1.2,<4.2.0
        - langchain-groq >=1.1.1,<1.2.0
        - langchain-huggingface >=1.2.0,<1.3.0
        - langchain-mcp-adapters >=0.1.14,<0.2.0
        - langchain-mistralai >=1.1.1,<1.2.0
        - langchain-mongodb >=0.11.0
        - langchain-ollama >=0.3.10,<0.4.0
        - langchain-openai >=1.1.6
        - langchain-perplexity >=1.0.0,<2.0.0
        - langchain-qdrant >=1.0.0,<2.0.0
        - langchainhub >=0.1.15,<0.2.0
        - langgraph-checkpoint >4.0.0,<5.0.0
        - langsmith >=0.3.42,<1.0.0
        # 4. Storage Engine, VectorDB, Data Access Clients
        - chromadb >=1.0.0,<2.0.0
        - qdrant-client >=1.12.0,<2.0.0
        - weaviate-client >=4.10.2,<5.0.0
        - opensearch-py ==2.8.0
        - elasticsearch >=8.19,<9.0
        - clickhouse-connect ==0.7.19
        - pymongo >=4.10.1
        - aiosqlite >=0.20.0,<1.0.0
        - pgvector >=0.4.2
        - duckdb >=1.0.0,<2.0.0
        - fastavro >=1.9.7,<2.0.0
        - fastparquet >=2024.11.0,<2025.0.0
        # 5. Heavy/External Domain-Specific SDK Tools
        - docling-core >=2.77.0,<3.0.0
        - docling-slim >=2.36.1,<3.0.0
        - composio ==0.9.2
        - traceloop-sdk >=0.43.1,<1.0.0
        - openinference-instrumentation-langchain >=0.1.29

    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

about:
  homepage: https://github.com/langflow-ai/langflow
  license: MIT
  license_file: LICENSE
  summary: Core execution and UI service runtime engines for Langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    Langflow is a modular visual framework designed for building scalable RAG and 
    multi-agent setups. This recipe structures the codebase into dedicated core outputs 
    while placing downstream integration plugins under strict constraint gates.

extra:
  recipe-maintainers:
    - rxm7706
